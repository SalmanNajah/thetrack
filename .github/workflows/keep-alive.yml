name: Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping App Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          if [ -z "${{ secrets.RENDER_APP_URL }}" ]; then
            echo "Error: RENDER_APP_URL secret is not set!"
            exit 1
          fi
          # Strip trailing slash from URL if present to avoid double slashes when appending /up
          BASE_URL=$(echo "${{ secrets.RENDER_APP_URL }}" | sed 's/\/$//')
          curl --fail --max-time 30 --show-error -L "${BASE_URL}/up"
